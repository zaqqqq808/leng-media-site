<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <rect width="200" height="120" fill="#ffffff"/>
  <!-- Simple dog face -->
  <ellipse cx="100" cy="46" rx="30" ry="26" fill="#C8A97A"/>
  <!-- Ears -->
  <ellipse cx="76" cy="30" rx="12" ry="16" fill="#C8A97A"/>
  <ellipse cx="124" cy="30" rx="12" ry="16" fill="#C8A97A"/>
  <!-- Face markings -->
  <ellipse cx="100" cy="50" rx="18" ry="14" fill="#E8D0A0"/>
  <!-- Eyes -->
  <circle cx="91" cy="42" r="4" fill="#2a2a2a"/>
  <circle cx="109" cy="42" r="4" fill="#2a2a2a"/>
  <circle cx="92.5" cy="40.5" r="1.5" fill="#ffffff"/>
  <circle cx="110.5" cy="40.5" r="1.5" fill="#ffffff"/>
  <!-- Nose -->
  <ellipse cx="100" cy="52" rx="5" ry="3.5" fill="#2a2a2a"/>
  <!-- Text -->
  <text x="100" y="90" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="18" font-weight="bold" fill="#4AABE0" letter-spacing="1">HEALTHY</text>
  <text x="100" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888888">Petz</text>
</svg>
